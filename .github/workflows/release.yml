# Build release artefacts when a v* tag is pushed:
#   - sdist + wheel (built once on Linux; uv_build is pure-Python)
#   - PyInstaller one-file binaries for Linux, Windows and macOS
# All artefacts are attached to a GitHub Release for the tag.
#
# PyPI publishing is intentionally NOT performed here; run
# `just publish` (or `just publish-test`) locally when ready.

name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs against a pre-existing tag for debugging. The
  # release step is guarded on refs/tags/v* so a dispatch against a
  # branch will build artefacts but not create a release.
  workflow_dispatch:

permissions:
  contents: write  # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-python:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build sdist + wheel
        run: uv build

      - name: Upload Python artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  build-pyinstaller:
    name: PyInstaller (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PyInstaller does NOT cross-compile, so we run one build per
        # target platform. macos-14 is Apple Silicon.
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true

      - name: Install uv-managed Python 3.13
        # Debian/Ubuntu minimal runners lack libpython3.13.so; uv's
        # managed Python ships the shared library PyInstaller needs.
        run: uv python install 3.13

      - name: Build standalone binary
        run: uv run --group pyinstaller python scripts/build_pyinstaller.py --clean

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: pyinstaller-${{ matrix.os }}
          path: |
            dist/pyinstaller/pymmich-*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build-python, build-pyinstaller]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Download all artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artefacts

      - name: Collect files for upload
        run: |
          mkdir -p release
          cp artefacts/python-dist/* release/
          # PyInstaller artefacts come out under artefacts/pyinstaller-<os>/.
          find artefacts -maxdepth 2 -type d -name 'pyinstaller-*' \
            -exec sh -c 'cp "$1"/pymmich-* release/' _ {} \;
          ls -la release

      - name: Extract release notes from CHANGELOG.md
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          version="${tag#v}"
          python3 scripts/extract_changelog.py "$version" > release_notes.md
          echo "Release notes for $version:"
          echo "----"
          cat release_notes.md
          echo "----"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          # Mark pre-releases automatically for tags like v1.0.0-rc1.
          prerelease_flag=""
          case "$tag" in
            *-*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file release_notes.md \
            $prerelease_flag \
            release/*
