# Run the pytest suite on every push and pull request.
#
# Kept deliberately lean: one job on Linux with Python 3.13, matching
# the development environment. The CLI is pure-Python and mocks the
# Immich API with respx, so no live services are needed.

name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref — useful when a PR branch is
# force-pushed while an earlier run is still queued.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (ubuntu / Python 3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run --group dev pytest
